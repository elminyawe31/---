<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدونة صيانة اللابتوب والطابعات والمقايسات الفنية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#0d1117;--bg2:#151b23;--card:#1c2333;--card2:#222b3a;--border:#2d3748;--text:#b8c4d4;--muted:#6e7a8a;--head:#e2e8f0;--acc:#10b981;--acc2:#059669;--accbg:rgba(16,185,129,.06);--accbd:rgba(16,185,129,.18);--ok:#22c55e;--err:#ef4444;--warn:#eab308;--info:#38bdf8;--r:10px;--sh:0 2px 16px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);line-height:1.9;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.rbar{position:fixed;top:0;left:0;height:3px;background:var(--acc);z-index:999;transition:width .15s;width:0}
.hdr{position:sticky;top:3px;z-index:100;background:rgba(13,17,23,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:16px}
.hlogo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none}
.hlogo-i{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--acc),#047857);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.hlogo-t{font-weight:800;font-size:14px;color:var(--head)}
.hnav{display:flex;align-items:center;gap:4px;margin-right:auto}
.hnav a{padding:6px 14px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:.2s;text-decoration:none;border:none;background:none;font-family:inherit}
.hnav a:hover,.hnav a.act{color:var(--acc);background:var(--accbg)}
.hmob{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer}
.hero{padding:60px 24px 40px;text-align:center;max-width:800px;margin:0 auto}
.hero h1{font-size:32px;font-weight:900;color:var(--head);line-height:1.4;margin-bottom:12px}
.hero h1 span{color:var(--acc)}
.hero p{font-size:14px;color:var(--muted);max-width:600px;margin:0 auto 20px}
.hero-stats{display:flex;justify-content:center;gap:32px;margin-top:24px}
.hero-stat{text-align:center}.hero-stat .n{font-size:24px;font-weight:800;color:var(--acc)}.hero-stat .l{font-size:11px;color:var(--muted)}
.cats{padding:0 24px 20px;max-width:1200px;margin:0 auto}
.cats-h{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px;padding-right:4px}
.cats-row{display:flex;gap:8px;flex-wrap:wrap}
.cat-btn{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:.2s;font-family:inherit}
.cat-btn:hover,.cat-btn.act{border-color:var(--accbd);color:var(--acc);background:var(--accbg)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:0 24px 40px;max-width:1200px;margin:0 auto}
.acard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.25s}
.acard:hover{border-color:var(--accbd);transform:translateY(-3px);box-shadow:var(--sh)}
.acard-img{height:140px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;overflow:hidden}
.acard-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--card))}
.acard-body{padding:16px 18px 18px}
.acard-cat{font-size:10px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.acard-title{font-size:15px;font-weight:700;color:var(--head);line-height:1.5;margin-bottom:6px}
.acard-excerpt{font-size:12px;color:var(--muted);line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.acard-meta{display:flex;align-items:center;gap:12px;margin-top:10px;font-size:11px;color:var(--muted)}
.acard-meta i{margin-left:4px}
.art-wrap{max-width:860px;margin:0 auto;padding:32px 24px 60px}
.art-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;margin-bottom:20px;transition:.2s;border:none;background:none;font-family:inherit}
.art-back:hover{color:var(--acc)}
.art-cat{font-size:11px;font-weight:700;color:var(--acc);margin-bottom:8px}
.art-title{font-size:26px;font-weight:900;color:var(--head);line-height:1.45;margin-bottom:12px}
.art-meta{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--muted);margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.art-meta i{margin-left:4px}
.art-body{font-size:13.5px;line-height:2}
.art-body p{margin-bottom:10px}
.art-body h3{font-size:16px;font-weight:700;color:var(--head);margin:22px 0 10px;padding-right:12px;border-right:3px solid var(--acc)}
.art-body h4{font-size:14px;font-weight:600;color:var(--head);margin:14px 0 6px}
.art-body ul{list-style:none;padding:0;margin:8px 0}
.art-body ul li{position:relative;padding:3px 20px 3px 0;font-size:13px}
.art-body ul li::before{content:'';position:absolute;right:0;top:13px;width:5px;height:5px;border-radius:50%;background:var(--acc)}
.art-body ol{padding-right:20px;margin:8px 0}
.art-body ol li{font-size:13px;padding:2px 0}
.art-body ol li::marker{color:var(--acc);font-weight:700}
.ib{border-radius:8px;padding:14px 16px;margin:14px 0;font-size:12.5px;line-height:1.9}
.ib.t{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);color:var(--acc)}
.ib.w{background:rgba(234,179,8,.06);border:1px solid rgba(234,179,8,.15);color:var(--warn)}
.ib.d{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);color:var(--err)}
.ib.i{background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.15);color:var(--info)}
.ib .bt{font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.fig{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:16px 0;overflow:hidden}
.fig svg{display:block;margin:0 auto;max-width:100%;height:auto}
.fig-cap{text-align:center;font-size:11px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.fig-cap strong{color:var(--acc)}
.stb{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
.stb thead th{background:var(--card2);color:var(--head);font-weight:700;padding:8px 12px;text-align:right;border-bottom:2px solid var(--accbd)}
.stb tbody td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.stb tbody tr:hover{background:rgba(16,185,129,.02)}
.art-nav{display:flex;justify-content:space-between;gap:12px;margin-top:40px;padding-top:24px;border-top:1px solid var(--border)}
.art-nav-btn{flex:1;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:.2s;font-family:inherit;text-align:right}
.art-nav-btn:hover{border-color:var(--accbd);background:var(--card2)}
.art-nav-btn .lbl{font-size:10px;color:var(--muted);margin-bottom:2px}
.art-nav-btn .val{font-size:12px;color:var(--head);font-weight:600}
.quiz-wrap{max-width:720px;margin:0 auto;padding:32px 24px 60px}
.quiz-header{text-align:center;margin-bottom:32px}
.quiz-header h2{font-size:22px;font-weight:800;color:var(--head);margin-bottom:6px}
.quiz-header p{font-size:13px;color:var(--muted)}
.quiz-cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:24px}
.qcat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:.25s;text-align:center}
.qcat-card:hover{border-color:var(--accbd);transform:translateY(-2px)}
.qcat-card .qi{width:40px;height:40px;border-radius:10px;background:var(--accbg);display:inline-flex;align-items:center;justify-content:center;color:var(--acc);font-size:16px;margin-bottom:8px}
.qcat-card .qt{font-size:13px;font-weight:700;color:var(--head);margin-bottom:4px}
.qcat-card .qn{font-size:11px;color:var(--muted)}
.qcat-card.done{border-color:var(--ok)}.qcat-card.done .qi{background:rgba(34,197,94,.1);color:var(--ok)}
.qall-btn{display:block;width:100%;max-width:400px;margin:0 auto 32px;padding:12px;background:linear-gradient(135deg,var(--acc),#047857);color:#fff;font-size:14px;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:.25s;font-family:inherit}
.qall-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(16,185,129,.3)}
.qov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:16px}
.qov.show{display:flex}
.qm{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:620px;max-height:88vh;overflow-y:auto;box-shadow:0 16px 50px rgba(0,0,0,.5);animation:qi .25s ease}
@keyframes qi{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.qh{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.qh h3{font-size:15px;color:var(--head)}
.qx{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}.qx:hover{color:var(--err)}
.qbd{padding:20px}
.qpb{width:100%;height:5px;background:var(--border);border-radius:3px;margin-bottom:18px;overflow:hidden}
.qpb span{display:block;height:100%;background:var(--acc);border-radius:3px;transition:width .4s}
.qn2{font-size:11px;color:var(--acc);font-weight:700;margin-bottom:4px}
.qt2{font-size:14px;font-weight:600;color:var(--head);margin-bottom:16px;line-height:1.7}
.qos{display:flex;flex-direction:column;gap:8px}
.qo{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:.2s;font-size:12.5px}
.qo:hover{border-color:var(--accbd);background:var(--card2)}
.qo.sel{border-color:var(--acc);background:var(--accbg);color:var(--acc)}
.qo.ok{border-color:var(--ok);background:rgba(34,197,94,.07);color:var(--ok)}
.qo.no{border-color:var(--err);background:rgba(239,68,68,.07);color:var(--err)}
.qo .oc{width:26px;height:26px;border-radius:50%;flex-shrink:0;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);transition:.2s}
.qo.sel .oc{border-color:var(--acc);color:var(--acc)}.qo.ok .oc{border-color:var(--ok);background:var(--ok);color:#fff}.qo.no .oc{border-color:var(--err);background:var(--err);color:#fff}
.qfb{margin-top:14px;padding:12px 14px;border-radius:8px;font-size:12px;display:none;line-height:1.8}
.qfb.sh{display:block}.qfb.cf{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.16);color:var(--ok)}.qfb.wf{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.16);color:var(--err)}
.qnb{display:none;margin-top:14px;padding:9px 22px;background:var(--acc);color:#fff;border:none;border-radius:7px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;transition:.2s}
.qnb:hover{background:var(--acc2)}
.qr{text-align:center;padding:28px 16px}
.qr .ri{width:68px;height:68px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:12px}
.qr .ri.p{background:rgba(34,197,94,.1);color:var(--ok)}.qr .ri.f{background:rgba(239,68,68,.1);color:var(--err)}
.qr h3{font-size:20px;color:var(--head);margin-bottom:6px}
.qr .sc{font-size:14px;color:var(--muted);margin-bottom:20px}.qr .sc span{color:var(--acc);font-weight:700}
.qrb{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.qrb button{padding:9px 20px;border-radius:7px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;font-weight:600;border:none;transition:.2s}
.br{background:var(--acc);color:#fff}.br:hover{background:var(--acc2)}
.bc{background:var(--card);color:var(--text);border:1px solid var(--border)!important}.bc:hover{background:var(--card2)}
.ft{background:var(--bg2);border-top:1px solid var(--border);padding:20px 24px;text-align:center;font-size:11px;color:var(--muted)}
.tc{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.tst{background:var(--card);border:1px solid var(--border);padding:8px 18px;border-radius:8px;font-size:12px;box-shadow:var(--sh);animation:tin .3s ease,tout .3s ease 2.3s forwards;pointer-events:auto}
.tst.s{border-color:rgba(34,197,94,.3);color:var(--ok)}.tst.e{border-color:rgba(239,68,68,.3);color:var(--err)}
@keyframes tin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
@keyframes tout{to{opacity:0;transform:translateY(-8px)}}
.fade{animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.cc h5{font-size:12px;font-weight:700;color:var(--acc);margin-bottom:6px}.cc li{font-size:11.5px;padding:2px 0}
@media(max-width:768px){.hnav{display:none;position:absolute;top:56px;right:0;width:100%;background:var(--bg2);border-bottom:1px solid var(--border);flex-direction:column;padding:8px}.hnav.show{display:flex}.hmob{display:block}.grid{grid-template-columns:1fr}.hero h1{font-size:24px}.art-title{font-size:20px}.cg{grid-template-columns:1fr}.quiz-cats{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.hdr{padding:0 14px}.hero{padding:40px 16px 24px}.grid{padding:0 14px 30px}.art-wrap{padding:24px 14px 40px}.stb{font-size:10.5px}.stb thead th,.stb tbody td{padding:6px}}
</style>
</head>
<body>
<div class="rbar" id="rbar"></div>
<header class="hdr">
<a class="hlogo" onclick="go('home')"><div class="hlogo-i"><i class="fas fa-microchip"></i></div><div class="hlogo-t">صيانة التقنية</div></a>
<nav class="hnav" id="hnav">
<a onclick="go('home')" class="act" id="nav-home"><i class="fas fa-home"></i> الرئيسية</a>
<a onclick="go('quiz')" id="nav-quiz"><i class="fas fa-question-circle"></i> الاختبارات</a>
</nav>
<button class="hmob" onclick="document.getElementById('hnav').classList.toggle('show')"><i class="fas fa-bars"></i></button>
</header>
<main id="app"></main>
<footer class="ft">إعداد: شركة يات لحلول التعليم (YAT) - مصلحة الكفاية الإنتاجية والتدريب المهني - الصف الثالث</footer>
<div class="qov" id="qov"><div class="qm"><div class="qh"><h3 id="qTi"></h3><button class="qx" onclick="clQ()"><i class="fas fa-times"></i></button></div><div class="qbd" id="qBd"></div></div></div>
<div class="tc" id="tc"></div>

<script>
// ═══════════════════════════════════════════════
//  رسوم SVG تقنية مضمّنة بدلاً من صور PDF
// ═══════════════════════════════════════════════
const SVG={
// شكل 1: الطابعة النقطية
dotmatrix:`<svg viewBox="0 0 520 280" xmlns="http://www.w3.org/2000/svg">
<rect x="20" y="30" width="300" height="220" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
<rect x="30" y="40" width="280" height="60" rx="5" fill="#0f172a" stroke="#334155"/>
<rect x="40" y="50" width="260" height="40" rx="3" fill="#1a2332"/>
<text x="170" y="75" text-anchor="middle" fill="#64748b" font-size="11" font-family="Cairo">مخرج الورق</text>
<rect x="320" y="80" width="180" height="170" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
<rect x="340" y="95" width="140" height="30" rx="4" fill="#0f172a" stroke="#334155"/>
<circle cx="355" cy="110" r="4" fill="#10b981"/><circle cx="370" cy="110" r="4" fill="#eab308"/><circle cx="385" cy="110" r="4" fill="#ef4444"/>
<rect x="340" y="135" width="140" height="100" rx="4" fill="#0f172a" stroke="#334155"/>
<text x="410" y="190" text-anchor="middle" fill="#64748b" font-size="10" font-family="Cairo">حامل الورق</text>
<rect x="60" y="120" width="220" height="80" rx="5" fill="#0f172a" stroke="#334155"/>
<line x1="80" y1="140" x2="80" y2="180" stroke="#475569" stroke-width="1"/>
<line x1="110" y1="140" x2="110" y2="180" stroke="#475569" stroke-width="1"/>
<line x1="140" y1="140" x2="140" y2="180" stroke="#475569" stroke-width="1"/>
<line x1="170" y1="140" x2="170" y2="180" stroke="#475569" stroke-width="1"/>
<line x1="200" y1="140" x2="200" y2="180" stroke="#475569" stroke-width="1"/>
<line x1="230" y1="140" x2="230" y2="180" stroke="#475569" stroke-width="1"/>
<line x1="260" y1="140" x2="260" y2="180" stroke="#475569" stroke-width="1"/>
<text x="170" y="168" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700" font-family="Cairo">رأس الطباعة</text>
<rect x="40" y="210" width="260" height="20" rx="3" fill="#334155"/>
<text x="170" y="224" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Cairo">أسطوانة الطباعة (Platen)</text>
<line x1="50" y1="110" x2="320" y2="110" stroke="#eab308" stroke-width="1" stroke-dasharray="4"/>
<text x="185" y="105" text-anchor="middle" fill="#eab308" font-size="9" font-family="Cairo">شريط الحبر (Ribbon)</text>
</svg>`,

// شكل 2: رأس الطباعة النقطية (الدبابيس)
printhead:`<svg viewBox="0 0 520 240" xmlns="http://www.w3.org/2000/svg">
<rect x="30" y="20" width="460" height="200" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
<text x="260" y="55" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700" font-family="Cairo">رأس الطباعة النقطية - مصفوفة الدبابيس</text>
<rect x="60" y="75" width="120" height="120" rx="8" fill="#0f172a" stroke="#334155"/>
<text x="120" y="95" text-anchor="middle" fill="#64748b" font-size="10" font-family="Cairo">9 دبابيس</text>
 ${Array.from({length:9},(_,i)=>`<circle cx="${82+i*9}" cy="${110+Math.floor(i/3)*20}" r="4" fill="#10b981"/>`).join('')}
<rect x="200" y="75" width="140" height="120" rx="8" fill="#0f172a" stroke="#334155"/>
<text x="270" y="95" text-anchor="middle" fill="#64748b" font-size="10" font-family="Cairo">18 دبوس</text>
 ${Array.from({length:18},(_,i)=>`<circle cx="${220+i*6.5}" cy="${108+Math.floor(i/6)*20}" r="3" fill="#38bdf8"/>`).join('')}
<rect x="360" y="75" width="110" height="120" rx="8" fill="#0f172a" stroke="#334155"/>
<text x="415" y="95" text-anchor="middle" fill="#64748b" font-size="10" font-family="Cairo">24 دبوس</text>
 ${Array.from({length:24},(_,i)=>`<circle cx="${378+i*4.2}" cy="${108+Math.floor(i/8)*20}" r="2.5" fill="#f59e0b"/>`).join('')}
<text x="260" y="220" text-anchor="middle" fill="#10b981" font-size="11" font-family="Cairo">كلما زاد عدد الدبابيس ← زادت دقة الطباعة</text>
</svg>`,

// شكل 5: خزان الحبر (Cartridge)
cartridge:`<svg viewBox="0 0 520 260" xmlns="http://www.w3.org/2000/svg">
<rect x="30" y="20" width="460" height="220" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
<rect x="80" y="50" width="160" height="150" rx="12" fill="#0f172a" stroke="#334155" stroke-width="2"/>

const articles=[
{id:'a1',cat:'طابعات',icon:'fa-print',clr:'#0ea5e9',title:'مقدمة عن الطابعات وأنواعها',date:'الوحدة 1',read:'8 دقائق',exc:'تعرف على أساسيات اختيار الطابعة المناسبة: دقة الطباعة DPI، سرعة الطباعة PPM، حجم الورق، ودورة الخدمة.',
body:`<p>تعتبر الطابعات من أهم وحدات الإخراج. اختيار الطابعة المناسبة يتعدى السعر - يجب معرفة احتياجك أولاً.</p><h3>أساسيات اختيار الطابعات</h3><ul><li><strong>دقة الطباعة (DPI):</strong> عدد نقاط الحبر في البوصة المربعة. كلما زادت زادت الدقة والتكلفة.</li><li><strong>سرعة الطباعة (PPM):</strong> عدد الصفحات في الدقيقة. الملونة لها سرعتين.</li><li><strong>حجم الورق:</strong> المنزلية غالباً A4، والدعائية A3 أو أكبر.</li><li><strong>دورة الخدمة:</strong> عدد الصفحات في الشهر.</li></ul>`},

{id:'a2',cat:'طابعات',icon:'fa-th',clr:'#0ea5e9',title:'الطابعات النقطية (Dot Matrix)',date:'الوحدة 1',read:'7 دقائق',exc:'الطابعات الضاربة الوحيدة القادرة على إنتاج أكثر من نسخة في نفس الوقت.',
body:`<p>تعتبر من نوع <strong style="color:var(--head)">الطابعات الضاربة (Impact)</strong> حيث يضرب رأس الطباعة الورقة فعلياً عبر شريط الحبر.</p><div class="ib t"><div class="bt"><i class="fas fa-lightbulb"></i> لماذا لا تزال مستخدمة؟</div>رغم ضجيجها وبطئها، هي الوحيدة القادرة على إنتاج أكثر من نسخة في نفس الوقت وتكلفة طباعة منخفضة جداً.</div><h3>رأس الطباعة</h3><p>يتألف من 9 أو 18 أو 24 دبوساً. كلما زاد العدد زادت الدقة. شريط الحبر (Ribbon) يمر بين الرأس والورق.</p><div class="fig">${SVG.dotmatrix}<div class="fig-cap"><strong>شكل 1</strong> - الطابعة النقطية (Dot Matrix Printer)</div></div><div class="fig">${SVG.printhead}<div class="fig-cap"><strong>شكل 2</strong> - رأس الطباعة النقطية: مصفوفة الدبابيس (9 / 18 / 24)</div></div>`},

{id:'a3',cat:'طابعات',icon:'fa-tint',clr:'#0ea5e9',title:'الطابعات النافثة للحبر (Inkjet)',date:'الوحدة 1',read:'10 دقائق',exc:'السيطرة على السوق بسبب سهولة التركيب وجودة الصور الملونة. تعرف على التقنيات الثلاث لضخ الحبر.',
body:`<p>أبسط وأخف من النقطية. سيطرت على السوق بسبب سهولة التركيب وجودة الصور الملونة وقلة الضجيج.</p><div class="ib w"><div class="bt"><i class="fas fa-exclamation-triangle"></i> مشكلة</div>تكلفة الطباعة مرتفعة مقارنة بالأنواع الأخرى.</div><div class="fig">${SVG.inkjet_tech}<div class="fig-cap"><strong>أشكال 4 و 5</strong> - التقنيات الثلاث لضخ الحبر + خزان الحبر (Ink Cartridge)</div></div><div class="fig">${SVG.cartridge}<div class="fig-cap"><strong>شكل 5</strong> - خزان الحبر المدمج مع رأس الطباعة</div></div>`},

{id:'a4',cat:'طابعات',icon:'fa-cogs',clr:'#0ea5e9',title:'مكونات ومراحل الطباعة النافثة',date:'الوحدة 1',read:'9 دقائق',exc:'المكونات العشرة والمراحل الثماني للطباعة من إرسال البيانات حتى خروج الورق.',
body:`<h3>المكونات العشرة</h3><ol><li><strong>رأس الطباعة (Print Head):</strong> نفث الحبر.</li><li><strong>عبوة الحبر (Ink Cartridge):</strong> مدمجة مع الرأس غالباً.</li><li><strong>محرك رأس الطباعة (Stepper Motor):</strong> يحرك الرأس.</li><li><strong>الحزام (Belt):</strong> يربط الرأس بالمحرك.</li><li><strong>حامل الورق (Paper Tray):</strong> يزوّد بالورق.</li><li><strong>بكرات السحب:</strong> تسحب وتحرك الورق.</li><li><strong>محرك البكرات:</strong> محرك خطوي.</li><li><strong>مصدر التغذية (Power Supply):</strong> إمداد الطاقة.</li><li><strong>اللوحة الرئيسية (Main Board):</strong> التحكم والمعالجة.</li><li><strong>المنافذ:</strong> USB و RJ45.</li></ol><h3>مراحل الطباعة</h3><ol><li>البرنامج يرسل البيانات للتعريف (Driver).</li><li>التعريف يترجم ويتحقق من التوصيل.</li><li>المعلومات ترسل عبر المنفذ.</li><li>الطابعة تخزنها في RAM خاصة.</li><li>إن لم تعمل لفترة: تنظيف تلقائي.</li><li>تفعيل محرك العجلات مع حساس الورق.</li><li>معايرة الرأس ثم البدء.</li><li>خروج الورق وعودة الرأس.</li></ol>`},

{id:'a5',cat:'طابعات',icon:'fa-exchange-alt',clr:'#0ea5e9',title:'فك وتركيب الحاويات وعبوات الحبر',date:'الوحدة 1',read:'6 دقائق',exc:'خطوات فك وتركيب حاويات الحبر النافثة وعبوة الحبر الليزرية (Toner).',
body:`<h3>حاويات الحبر النافثة</h3><ol><li>نزع اللاصق → وصّل الطابعة → شغّل لإحضار الحامل → افصل التيار.</li><li>ارفع الغطاء → ارفع رافعة الإقفال → اسحب الفارغة.</li><li>أنظف الحاملة خاصة رأس الطباعة → ركّب الجديدة.</li><li>أغلق → شغّل → ستخرج نسخة تجربة.</li></ol><h3>عبوة الحبر الليزرية (Toner)</h3><ol><li>اضغط زر فتح الباب → افتحه → اسحب العبوة القديمة.</li><li>أخرج الجديدة → رجّها 5-6 مرات.</li><li>محاذاة مع المسارات → ثبتها → أغلق الباب.</li></ol>`},

{id:'a6',cat:'طابعات',icon:'fa-bolt',clr:'#0ea5e9',title:'الطابعة الليزرية - المكونات والمراحل',date:'الوحدة 1',read:'14 دقائق',exc:'الأفضل على الإطلاق: المكونات الـ 12 ومراحل الطباعة الست.',
body:`<p><strong style="color:var(--head)">الأفضل:</strong> جودة عالية، سرعة 20+ صفحة/دقيقة، دورة خدمة عشرات الآلاف شهرياً، هادئة، تكلفة صفحة منخفضة.</p><div class="fig">${SVG.lasercomp}<div class="fig-cap"><strong>أشكال 10-15</strong> - المكونات الرئيسية + مراحل الطباعة الست + مسار الورق</div></div><div class="ib d"><div class="bt"><i class="fas fa-exclamation-circle"></i> تحذير</div>وحدة التغذية الليزر توفر جهد مرتفع خطير!</div>`},

{id:'a7',cat:'طابعات',icon:'fa-plug',clr:'#0ea5e9',title:'اتصال الطابعات وانحشار الورق',date:'الوحدة 1',read:'11 دقائق',exc:'طرق الاتصال ومعالجة انحشار الورق في جميع المواقع الستة.',
body:`<div class="fig">${SVG.connectors}<div class="fig-cap"><strong>أشكال 16-17</strong> - طرق توصيل الطابعات: DB-25 متوازي و USB تسلسلي</div></div><div class="fig">${SVG.paperjam}<div class="fig-cap"><strong>شكل 28</strong> - الأماكن الستة المحتملة لانحشار الورق في HP 402 DN</div></div><h3>إزالة انحشار الدرج 1</h3><ol><li>اسحب الورق ببطء.</li><li>أخرج الدرج → أزل التالف.</li><li>تحقق من توجيه الورق.</li><li>ضع الورق مسطحاً.</li><li>أعد الدرج → افتح الباب → أخرج الحبر → أزل الورق بحرص.</li></ol><h3>عدم التقاط الورق</h3><ol><li>أزل ورق ممزق.</li><li>أعد ترتيب الورق.</li><li>حمّل بالمقاس الصحيح.</li><li>تأكد من إعدادات المقاس.</li><li>امسح الأسطوانات بقماش مبلل بماء مقطر.</li></ol>`},

{id:'a8',cat:'طابعات',icon:'fa-bug',clr:'#0ea5e9',title:'المشاكل الشائعة والصيانة الدورية',date:'الوحدة 1',read:'15 دقائق',exc:'جميع المشاكل في النقطية والنافثة والليزرية مع الحلول والصيانة الدورية الكاملة.',
body:`<div class="fig">${SVG.boards}<div class="fig-cap"><strong>أشكال 44-45</strong> - اللوحة الرئيسية (Main Board) ووحدة التغذية (Power Supply)</div></div><h3>مشاكل النقطية</h3><table class="stb"><thead><tr><th>المشكلة</th><th>الحل</th></tr></thead><tbody><tr><td>خطوط بيضاء</td><td>نظّف الرأس بالكحول أو استبدله</td></tr><tr><td>نص مقطوع</td><td>تعديل رأس الطباعة</td></tr><tr><td>صورة فاتحة من طرف</td><td>تعديل صفيحة استناد الورق</td></tr><tr><td>لا تعمل</td><td>افحص الكهرباء والفيوز</td></tr><tr><td>الرأس يتحرك ولا يطبع</td><td>شريط غير مثبت أو خالٍ من الحبر</td></tr></tbody></table><h3>مشاكل النافثة</h3><table class="stb"><thead><tr><th>المشكلة</th><th>الحل</th></tr></thead><tbody><tr><td>لا تباشر العمل</td><td>تأكد من تثبيت الحاوية والكابل</td></tr><tr><td>ورقة بيضاء</td><td>حبر فاسد أو عدم تطابق - أعِد التعريف</td></tr><tr><td>خطوط بيضاء</td><td>حبر جاف سدّ الثقوب - نظّف الرأس</td></tr><tr><td>"خطأ في الاتصال"</td><td>عطل كابل أو عدم تطابق العلة</td></tr><tr><td>الورق لا يتقدم</td><td>ازدحام - اسحبه وأعد التشغيل</td></tr></tbody></table><h3>مشاكل الليزرية</h3><table class="stb"><thead><tr><th>المشكلة</th><th>الحل</th></tr></thead><tbody><tr><td>طيف صفحة سابقة</td><td>مصباح المحو</td></tr><tr><td>نقاط سوداء ثابتة</td><td>سكين مطاطية غير مناسب</td></tr><tr><td>علامات بنفس الموضع</td><td>أسطوانة تالفة</td></tr><tr><td>طباعة خفيفة</td><td>حبر غير كافٍ</td></tr><tr><td>حبر غير ملتصق</td><td>مشكلة في Fuser</td></tr><tr><td>أوراق ملتصقة</td><td>مزيل الشحنة الساكنة</td></tr></tbody></table><h3>الصيانة الدورية</h3><ol><li><strong>رأس الطباعة:</strong> قطن + كحول (يمنع غشاء عازل).</li><li><strong>وحدة التظهير:</strong> هزّ يميناً ويساراً.</li><li><strong>مسارات العربة:</strong> قماش + بخاخ + زيت خاص.</li><li><strong>بكرات السحب:</strong> قماش فقط (المطاط يصبح ناعماً).</li><li><strong>وحدة التثبيت:</strong> 150-200° - محلول خاص + قفازات + تحت 40°.</li></ol>`},

{id:'a9',cat:'محمول',icon:'fa-laptop',clr:'#f59e0b',title:'الأجهزة المحمولة - الميزات والمقارنة',date:'الوحدة 2',read:'8 دقائق',exc:'ميزات المحمول ومقارنة شاملة مع المكتبي.',
body:`<div class="fig">${SVG.laptop}<div class="fig-cap"><strong>أشكال 47-51</strong> - الحاسب المحمول من جميع الجهات مع المنافذ الخارجية</div></div><div class="cg"><div class="cc"><h5><i class="fas fa-laptop"></i> المحمول</h5><ul class="cl"><li>صغير وقابل للتنقل</li><li>أغلى سعراً</li><li>قطع متخصصة ملكية</li><li>عمر 3-4 سنوات</li><li>التطوير صعب (الرام فقط)</li><li>الصيانة أصعب وأغلى</li></ul></div><div class="cc"><h5><i class="fas fa-desktop"></i> المكتبي</h5><ul class="cl"><li>كبير وثابت</li><li>أرخص</li><li>قطع قياسية متعددة المصادر</li><li>عمر 5-6 سنوات</li><li>كل قطعة قابلة للتطوير</li><li>الصيانة أسهل وأوفر</li></ul></div></div>`},

{id:'a10',cat:'محمول',icon:'fa-wrench',clr:'#f59e0b',title:'تفكيك المحمول واستبدال الرام والشاشة',date:'الوحدة 2',read:'10 دقائق',exc:'خطوات التفكيك الكاملة واستبدال RAM واستبدال شاشة LCD.',
body:`<h3>خطوات التفكيك</h3><ol><li>فصل التيار وإزالة البطارية.</li><li>إزالة الأغطية والبراغي (وثّق موقع كل برغي!).</li><li>فصل الكابلات بحذر.</li><li>إزالة: RAM ← قرص ← محرك أقراص ← لوحة مفاتيح...</li></ol><h3>استبدال RAM</h3><ol><li>افصل التيار وأزل البطارية.</li><li>افتح غطاء الذاكرة.</li><li>افكّ مشابك التثبيت.</li><li>اسحب الشريحة بزاوية 30°.</li><li>ركّب الجديدة بزاوية 30° → اضغط.</li></ol><div class="ib t"><div class="bt"><i class="fas fa-lightbulb"></i> نصيحة</div>تأكد من نوع الرام المتوافق (DDR2/DDR3/DDR4) قبل الشراء.</div><h3>استبدال شاشة LCD</h3><ol><li>افصل التيار وأزل البطارية.</li><li>أزل إطار الشاشة (Bezel).</li><li>افصل كابل الشاشة.</li><li>أزل التالفة ← ركّب الجديدة.</li></ol><div class="ib d"><div class="bt"><i class="fas fa-exclamation-circle"></i> تحذير</div>كابل الشاشة رقيق وحساس. الشاشة تتكسر بسهولة.</div>`},

{id:'a11',cat:'محمول',icon:'fa-spray-can',clr:'#f59e0b',title:'تنظيف المحمول والمشاكل الشائعة',date:'الوحدة 2',read:'8 دقائق',exc:'إجراءات تنظيف جميع الأجزاء والمشاكل الشائعة وحلولها.',
body:`<h3>إجراءات التنظيف</h3><ul><li><strong>لوحة المفاتيح:</strong> هواء مضغوط + قماش مبلل بمحلول خفيف.</li><li><strong>التهوية:</strong> هواء مضغوط لفتحات التهوية.</li><li><strong>شاشة LCD:</strong> قماش microfiber + محلول شاشات فقط.</li><li><strong>لوحة اللمس:</strong> قماش ناعم مبلل قليلاً.</li><li><strong>محرك الأقراص:</strong> قرص تنظيف خاص.</li></ul><h3>المشاكل الشائعة</h3><ul><li><strong>ارتفاع الحرارة:</strong> انسداد تهوية / تلف مروحة → نظّف أو غيّر المروحة أو المعجون.</li><li><strong>مشاكل الشاشة:</strong> كابل أو شاشة أو لوحة أم.</li><li><strong>البطارية:</strong> استبدال أو فحص المحول.</li><li><strong>لا يشغّل:</strong> تيار ← بطارية ← رام ← معالج.</li></ul>`},

{id:'a12',cat:'دعم فني',icon:'fa-headset',clr:'#8b5cf6',title:'الدعم الفني ومكتبه',date:'الوحدة 3',read:'6 دقائق',exc:'مفهوم الدعم الفني ومستوياته الثلاثة ومهام مكتب الدعم.',
body:`<h3>المستويات الثلاثة</h3><ul><li><strong>الأول:</strong> استقبال وتسجيل البلاغات + حل البسيط.</li><li><strong>الثاني:</strong> متخصصون للمشاكل المعقدة.</li><li><strong>الثالث:</strong> خبراء للمعقدة جداً وعيوب التصميم.</li></ul><h3>مهام مكتب الدعم</h3><ul><li>استقبال وتسجيل البلاغات</li><li>تصنيف الأولويات (عاجل/متوسط/عادي)</li><li>توزيع على الفنيين</li><li>متابعة حتى الإغلاق</li><li>تقارير دورية</li><li>قاعدة معرفية</li></ul><h3>الأدوات</h3><ul><li>Ticketing System</li><li>Knowledge Base</li><li>Remote Desktop</li><li>نظام هاتف</li><li>برامج مراقبة</li></ul>`},

{id:'a13',cat:'تقارير',icon:'fa-file-alt',clr:'#ec4899',title:'التقارير الفنية',date:'الوحدة 4',read:'7 دقائق',exc:'التعريف والأنواع الخمسة والعناصر التسعة مع نموذج عملي.',
body:`<h3>الأنواع</h3><ul><li><strong>تشخيص عطل</strong></li><li><strong>صيانة دورية</strong></li><li><strong>تركيب وتشغيل</strong></li><li><strong>تقييم</strong></li><li><strong>حادثة</strong></li></ul><h3>العناصر التسعة</h3><ol><li>رقم التقرير وتاريخه</li><li>بيانات المُعد</li><li>بيانات الجهاز</li><li>وصف المشكلة</li><li>التشخيص</li><li>الإجراءات</li><li>النتيجة</li><li>التوصيات</li><li>التوقيع</li></ol><div class="ib i"><div class="bt"><i class="fas fa-info-circle"></i> نموذج</div><table class="stb"><tbody><tr><td style="color:var(--acc);font-weight:700;width:30%">الجهاز</td><td>HP LaserJet 402 DN</td></tr><tr><td style="color:var(--acc);font-weight:700">المشكلة</td><td>انحشار ورق متكرر</td></tr><tr><td style="color:var(--acc);font-weight:700">التشخيص</td><td>تلف بكرات السحب</td></tr><tr><td style="color:var(--acc);font-weight:700">النتيجة</td><td>تم الحل</td></tr><tr><td style="color:var(--acc);font-weight:700">التوصيات</td><td>صيانة كل 3 أشهر</td></tr></tbody></table></div>`},

function go(p,id){page=p;document.querySelectorAll('.hnav a').forEach(a=>a.classList.remove('act'));document.getElementById('nav-'+(p==='home'?'home':'quiz')).classList.add('act');document.getElementById('hnav').classList.remove('show');window.scrollTo({top:0});if(p==='home')renderHome();else if(p==='article')renderArticle(id);else if(p==='quiz')renderQuiz();}
window.addEventListener('scroll',()=>{const h=document.documentElement.scrollHeight-window.innerHeight;document.getElementById('rbar').style.width=(h>0?(window.scrollY/h)*100:0)+'%';});

function renderHome(){const cats=[...new Set(articles.map(a=>a.cat))];let h=`<div class="hero fade"><h1>مدونة <span>صيانة اللابتوب والطابعات</span> والمقايسات الفنية</h1><p>شروحات مبسطة مع رسوم تقنية تفاعلية واختبارات شاملة - مستوحاة من كتاب الصف الثالث</p><div class="hero-stats"><div class="hero-stat"><div class="n">${articles.length}</div><div class="l">مقال تعليمي</div></div><div class="hero-stat"><div class="n">${Object.values(QB).flat().length}</div><div class="l">سؤال اختبار</div></div><div class="hero-stat"><div class="n">${qCats.length}</div><div class="l">تصنيف</div></div></div></div><div class="cats fade"><div class="cats-h">تصفية حسب التصنيف</div><div class="cats-row"><button class="cat-btn act" onclick="filterCat('all',this)">الكل</button>`;cats.forEach(c=>{h+=`<button class="cat-btn" onclick="filterCat('${c}',this)">${c}</button>`;});h+=`</div></div><div class="grid" id="agrid">`;articles.forEach((a,i)=>{h+=`<div class="acard fade" data-cat="${a.cat}" onclick="go('article','${a.id}')" style="animation-delay:${i*30}ms"><div class="acard-img" style="background:linear-gradient(135deg,${a.clr}15,${a.clr}05)"><i class="fas ${a.icon}" style="color:${a.clr};position:relative;z-index:1"></i></div><div class="acard-body"><div class="acard-cat">${a.cat}</div><div class="acard-title">${a.title}</div><div class="acard-excerpt">${a.exc}</div><div class="acard-meta"><span><i class="far fa-clock"></i>${a.read}</span><span><i class="far fa-folder"></i>${a.date}</span></div></div></div>`;});h+=`</div>`;document.getElementById('app').innerHTML=h;}
function filterCat(c,btn){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('act'));btn.classList.add('act');document.querySelectorAll('.acard').forEach(c2=>{c2.style.display=(c==='all'||c2.dataset.cat===c)?'':'none';});}

function renderArticle(id){const a=articles.find(x=>x.id===id);if(!a)return go('home');const idx=articles.indexOf(a),prev=idx>0?articles[idx-1]:null,next=idx<articles.length-1?articles[idx+1]:null;let h=`<div class="art-wrap fade"><button class="art-back" onclick="go('home')"><i class="fas fa-arrow-right"></i> العودة</button><div class="art-cat"><i class="fas ${a.icon}"></i> ${a.cat}</div><div class="art-title">${a.title}</div><div class="art-meta"><span><i class="far fa-clock"></i>${a.read}</span><span><i class="far fa-folder"></i>${a.date}</span></div><div class="art-body">${a.body}</div><div class="art-nav">`;if(prev)h+=`<div class="art-nav-btn" onclick="go('article','${prev.id}')"><div class="lbl">← السابق</div><div class="val">${prev.title}</div></div>`;else h+=`<div></div>`;if(next)h+=`<div class="art-nav-btn" onclick="go('article','${next.id}')"><div class="lbl">التالي →</div><div class="val">${next.title}</div></div>`;h+=`</div></div>`;document.getElementById('app').innerHTML=h;}

function renderQuiz(){let t=Object.values(QB).flat().length;let h=`<div class="quiz-wrap fade"><div class="quiz-header"><h2>الاختبارات التفاعلية</h2><p>${t} سؤال على ${qCats.length} تصنيفات</p></div><button class="qall-btn" onclick="startQuiz('all')"><i class="fas fa-play"></i> اختبار شامل - جميع الأسئلة</button><div class="quiz-cats">`;qCats.forEach(c=>{const qs=QB[c.name]||[];const dn=doneQ[c.name];h+=`<div class="qcat-card ${dn?'done':''}" onclick="startQuiz('${c.name}')"><div class="qi"><i class="fas ${c.icon}"></i></div><div class="qt">${c.name}</div><div class="qn">${qs.length} سؤال ${dn?'<i class="fas fa-check-circle" style="color:var(--ok);margin-right:4px"></i>':''}</div></div>`;});h+=`</div></div>`;document.getElementById('app').innerHTML=h;}

function startQuiz(cat){qCurCat=cat;qCurQs=cat==='all'?Object.values(QB).flat():[...(QB[cat]||[])];qCurQs=[...qCurQs].sort(()=>Math.random()-.5);qIdx=0;qScore=0;document.getElementById('qTi').textContent=cat==='all'?'اختبار شامل':'اختبار: '+cat;renderQ();document.getElementById('qov').classList.add('show');}
function clQ(){document.getElementById('qov').classList.remove('show');}
function renderQ(){const q=qCurQs[qIdx],bd=document.getElementById('qBd'),pct=Math.round((qIdx/qCurQs.length)*100),L=['أ','ب','ج','د'];let h=`<div class="qpb"><span style="width:${pct}%"></span></div><div class="qn2">السؤال ${qIdx+1} من ${qCurQs.length}</div><div class="qt2">${q.q}</div><div class="qos">`;q.o.forEach((o,i)=>{h+=`<div class="qo" onclick="selA(${i})" id="opt-${i}"><div class="oc">${L[i]}</div><span>${o}</span></div>`;});h+=`</div><div class="qfb" id="qfb"></div><button class="qnb" id="qnb" onclick="nextQ()">السؤال التالي <i class="fas fa-arrow-left"></i></button>`;bd.innerHTML=h;}
function selA(i){const q=qCurQs[qIdx];if(document.querySelector('.qo.ok')||document.querySelector('.qo.no'))return;const ok=i===q.c;if(ok)qScore++;document.getElementById('opt-'+i).classList.add(ok?'ok':'no');if(!ok)document.getElementById('opt-'+q.c).classList.add('ok');const fb=document.getElementById('qfb');fb.className='qfb sh '+(ok?'cf':'wf');fb.innerHTML=(ok?'<i class="fas fa-check-circle"></i> إجابة صحيحة! ':'<i class="fas fa-times-circle"></i> إجابة خاطئة. ')+'<strong>الشرح:</strong> '+q.e;document.getElementById('qnb').style.display='inline-block';}
function nextQ(){qIdx++;if(qIdx>=qCurQs.length){showResult();return;}renderQ();}
function showResult(){const pct=Math.round((qScore/qCurQs.length)*100),pass=pct>=60;if(pass)doneQ[qCurCat]=true;const bd=document.getElementById('qBd');let h=`<div class="qr"><div class="ri ${pass?'p':'f'}"><i class="fas ${pass?'fa-trophy':'fa-redo'}"></i></div><h3>${pass?'ممتاز! نجحت':'تحتاج مراجعة'}</h3><div class="sc">حصلت على <span>${qScore}</span> من <span>${qCurQs.length}</span> (${pct}%)</div><div class="qrb"><button class="br" onclick="startQuiz('${qCurCat}')"><i class="fas fa-redo"></i> إعادة</button><button class="bc" onclick="clQ()"><i class="fas fa-times"></i> إغلاق</button></div></div>`;bd.innerHTML=h;toast(pass?'تم اجتياز الاختبار!':'تحتاج مراجعة',pass?'s':'e');}
function toast(msg,type){const tc=document.getElementById('tc'),t=document.createElement('div');t.className='tst '+(type||'');t.textContent=msg;tc.appendChild(t);setTimeout(()=>t.remove(),2800);}
renderHome();
</script>
</body>
</html>
